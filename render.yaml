services:
  - type: web
    name: cva-backend
    runtime: python
    buildCommand: cd backend && pip install -r requirements.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    pythonVersion: "3.11"
    envVars:
      - key: ALLOWED_ORIGINS
        sync: false   # set manually in Render dashboard to your Vercel URL
